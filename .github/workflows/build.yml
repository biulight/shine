name: build

on:
  push:
    branches:
      - release
    tags:
      - v*
  pull_request:
    branches:
      - release
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install Rust
        run: rustup toolchain install stable --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install nextest
        uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - name: Check code format
        run: cargo fmt -- --check
      - name: Check the package for errors
        run: cargo check --all
      - name: Lint rust sources
        run: cargo clippy --all-targets --all-features --tests --benches -- -D warnings
      - name: Execute rust tests
        run: cargo nextest run --all-features

  build-release-assets:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_target: linux-x86_64
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_target: linux-aarch64
          - runner: macos-14
            target: aarch64-apple-darwin
            asset_target: darwin-aarch64
          - runner: macos-14
            target: x86_64-apple-darwin
            asset_target: darwin-x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install Linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release -p cli --target ${{ matrix.target }}
      - name: Package release archive
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/shine" dist/shine
          tar -czf "dist/shine-v${VERSION}-${{ matrix.asset_target }}.tar.gz" -C dist shine
      - name: Upload packaged artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_target }}
          path: dist/shine-v*.tar.gz

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - test
      - build-release-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Prepare release files
        run: |
          chmod +x install.sh
          find dist -type f -name 'shine-v*.tar.gz' -print
      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.git-cliff.outputs.content }}
          files: |
            dist/**/*.tar.gz
            install.sh

  open-main-pr:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Create or reuse release PR
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = "release";
            const base = "main";

            const { data: existingPulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${head}`,
              base,
            });

            if (existingPulls.length > 0) {
              core.info(`Open PR already exists: #${existingPulls[0].number}`);
              return;
            }

            const tag = context.ref.replace("refs/tags/", "");
            const title = `chore(release): merge ${tag} into main`;
            const body = [
              "Automated release sync PR.",
              "",
              `- Source branch: \`${head}\``,
              `- Target branch: \`${base}\``,
              `- Release tag: \`${tag}\``,
            ].join("\n");

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner,
                repo,
                title,
                head,
                base,
                body,
              });
              core.info(`Created PR #${pr.number}`);
            } catch (err) {
              core.warning(
                `Could not create release PR automatically: ${err.message}\n` +
                `To fix, go to Settings → Actions → General and enable ` +
                `"Allow GitHub Actions to create and approve pull requests", ` +
                `then open the PR manually: ` +
                `https://github.com/${owner}/${repo}/compare/${base}...${head}`
              );
            }
