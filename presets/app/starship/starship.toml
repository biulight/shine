# shine-dest: ~/.config/starship/starship.toml
# Starship prompt: minimal left-prompt with git branch and status.
# Requires nerd-font: https://www.nerdfonts.com

format = "$username$directory$git_branch$git_status$character"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
